<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050a14"/>
      <stop offset="1" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2ee8c8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2ee8c8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2ee8c8"/>
      <stop offset="0.5" stop-color="#5ce1ff"/>
      <stop offset="1" stop-color="#14d4b8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2f47" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="120" rx="500" ry="280" fill="url(#glow)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.4"/>
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#2ee8c8" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Terminal window -->
  <g filter="url(#softGlow)">
    <rect x="120" y="110" width="960" height="410" rx="16" fill="#0f1a2e" stroke="#1e2f47" stroke-width="2"/>
    <rect x="120" y="110" width="960" height="48" rx="16" fill="#162338"/>
    <rect x="120" y="142" width="960" height="16" fill="#162338"/>

    <!-- Window controls -->
    <circle cx="156" cy="134" r="8" fill="#ff5f57"/>
    <circle cx="184" cy="134" r="8" fill="#febc2e"/>
    <circle cx="212" cy="134" r="8" fill="#28c840"/>

    <!-- Title bar text -->
    <text x="600" y="139" text-anchor="middle" fill="#64748b" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="14" letter-spacing="0.08em">hesamsamani.codes — zsh</text>

    <!-- Terminal content -->
    <text x="160" y="210" fill="#64748b" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="22">$ whoami</text>
    <text x="160" y="255" fill="#2ee8c8" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="36" font-weight="600">Hesam Samani</text>

    <text x="160" y="310" fill="#64748b" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="22">$ cat role.txt</text>
    <text x="160" y="355" fill="url(#accent)" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="32" font-weight="600">AI Tool Builder</text>

    <text x="160" y="410" fill="#64748b" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="22">$ ls projects/</text>
    <text x="160" y="450" fill="#8b9cb3" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="20">privacy-first apps  open-source  python  desktop tools</text>

    <!-- Blinking cursor -->
    <rect x="160" y="468" width="14" height="24" fill="#2ee8c8" opacity="0.9"/>
  </g>

  <!-- Corner accent -->
  <path d="M1080 80 L1200 80 L1200 200" stroke="#2ee8c8" stroke-width="2" opacity="0.25"/>
  <path d="M120 550 L0 550 L0 630" stroke="#14d4b8" stroke-width="2" opacity="0.25"/>
</svg>